name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install llama.cpp
        run: |
          brew update
          brew install llama.cpp
          # Gemma 4 support requires build >= 8670 (GGML >= 0.9.11)
          LLAMA_VER=$(/opt/homebrew/bin/llama-completion --version 2>&1 | grep -oE 'version: [0-9]+' | grep -oE '[0-9]+')
          echo "llama.cpp version: $LLAMA_VER"
          if [ -n "$LLAMA_VER" ] && [ "$LLAMA_VER" -lt 8670 ]; then
            echo "::error::llama.cpp version $LLAMA_VER is too old (need >= 8670 for Gemma 4 support)"
            exit 1
          fi

      - name: Create App Icon
        run: |
          mkdir -p AppIcon.iconset

          # Apply rounded corners (macOS style ~22% radius)
          swift -e '
          import AppKit
          let src = NSImage(contentsOfFile: "Resources/AirLingua.png")!
          let canvas = NSSize(width: 1024, height: 1024)
          let scale: CGFloat = 0.80
          let iconSize = NSSize(width: canvas.width * scale, height: canvas.height * scale)
          let offset = (canvas.width - iconSize.width) / 2
          let radius = iconSize.width * 0.22
          let img = NSImage(size: canvas)
          img.lockFocus()
          NSColor.clear.setFill()
          NSRect(origin: .zero, size: canvas).fill()
          let rect = NSRect(x: offset, y: offset, width: iconSize.width, height: iconSize.height)
          NSBezierPath(roundedRect: rect, xRadius: radius, yRadius: radius).addClip()
          src.draw(in: rect)
          img.unlockFocus()
          let data = img.tiffRepresentation.flatMap { NSBitmapImageRep(data: $0) }?.representation(using: .png, properties: [:])
          try! data!.write(to: URL(fileURLWithPath: "/tmp/icon_processed.png"))
          '

          SRC="/tmp/icon_processed.png"
          sips -z 16 16     "$SRC" --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32     "$SRC" --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32     "$SRC" --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64     "$SRC" --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128   "$SRC" --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256   "$SRC" --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256   "$SRC" --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512   "$SRC" --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512   "$SRC" --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 "$SRC" --out AppIcon.iconset/icon_512x512@2x.png

          # Copy to Asset Catalog
          ICON_DIR="LocalTranslate/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          cp AppIcon.iconset/* "$ICON_DIR/"

          # Create Contents.json
          cat > "$ICON_DIR/Contents.json" << 'ICONJSON'
          {
            "images" : [
              { "filename" : "icon_16x16.png", "idiom" : "mac", "scale" : "1x", "size" : "16x16" },
              { "filename" : "icon_16x16@2x.png", "idiom" : "mac", "scale" : "2x", "size" : "16x16" },
              { "filename" : "icon_32x32.png", "idiom" : "mac", "scale" : "1x", "size" : "32x32" },
              { "filename" : "icon_32x32@2x.png", "idiom" : "mac", "scale" : "2x", "size" : "32x32" },
              { "filename" : "icon_128x128.png", "idiom" : "mac", "scale" : "1x", "size" : "128x128" },
              { "filename" : "icon_128x128@2x.png", "idiom" : "mac", "scale" : "2x", "size" : "128x128" },
              { "filename" : "icon_256x256.png", "idiom" : "mac", "scale" : "1x", "size" : "256x256" },
              { "filename" : "icon_256x256@2x.png", "idiom" : "mac", "scale" : "2x", "size" : "256x256" },
              { "filename" : "icon_512x512.png", "idiom" : "mac", "scale" : "1x", "size" : "512x512" },
              { "filename" : "icon_512x512@2x.png", "idiom" : "mac", "scale" : "2x", "size" : "512x512" }
            ],
            "info" : { "author" : "xcode", "version" : 1 }
          }
          ICONJSON

          rm -rf AppIcon.iconset

      - name: Setup Signing Certificate
        env:
          SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import as identity (key + cert pair)
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$SIGNING_CERT_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$SIGNING_CERT_PASSWORD" \
            -A \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          # Allow codesign to access the keychain without prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Trust the self-signed certificate for code signing
          # Extract the cert from keychain, add to trust settings
          security find-certificate -a -p "$KEYCHAIN_PATH" > "$RUNNER_TEMP/cert.pem"
          sudo security add-trusted-cert -d -r trustRoot -k "$KEYCHAIN_PATH" "$RUNNER_TEMP/cert.pem"
          rm "$RUNNER_TEMP/cert.pem"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify exactly one valid codesigning identity exists (fail-fast)
          IDENTITY_OUTPUT=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")
          VALID_COUNT=$(echo "$IDENTITY_OUTPUT" | tail -1 | grep -oE '[0-9]+')
          if [ "$VALID_COUNT" -lt 1 ] 2>/dev/null; then
            echo "::error::No valid codesigning identity found in keychain"
            echo "$IDENTITY_OUTPUT"
            exit 1
          fi
          IDENTITY=$(echo "$IDENTITY_OUTPUT" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "Found $VALID_COUNT valid identity(ies). Using: $IDENTITY"

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          xcodebuild -project LocalTranslate.xcodeproj \
            -scheme LocalTranslate \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=YES \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            MARKETING_VERSION="$VERSION"

      - name: Prepare App Bundle
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          APP_PATH="build/Build/Products/Release/LocalTranslate.app"

          # Rename to AirLingua.app
          mv "$APP_PATH" "build/Build/Products/Release/AirLingua.app"
          APP_PATH="build/Build/Products/Release/AirLingua.app"

          # Bundle llama-completion with all dependencies
          RESOURCES_DIR="$APP_PATH/Contents/Resources"
          LLAMA_BIN="/opt/homebrew/bin/llama-completion"

          # Copy binary
          cp "$LLAMA_BIN" "$RESOURCES_DIR/"
          chmod +x "$RESOURCES_DIR/llama-completion"

          # Bundle ggml backend plugins (Metal, CPU variants, etc.)
          # ggml_backend_load_best() searches: GGML_BACKEND_DIR (compile-time) →
          # executable directory → cwd. By placing .so files next to llama-completion
          # in Resources/, the "executable directory" fallback finds them.
          GGML_LIBEXEC="/opt/homebrew/opt/ggml/libexec"
          if [ ! -d "$GGML_LIBEXEC" ]; then
            echo "::error::ggml libexec not found at $GGML_LIBEXEC"
            exit 1
          fi
          echo "=== Copying ggml backend plugins ==="
          cp -L "$GGML_LIBEXEC"/*.so "$RESOURCES_DIR/"
          BACKEND_COUNT=$(ls "$RESOURCES_DIR"/*.so 2>/dev/null | wc -l)
          if [ "$BACKEND_COUNT" -eq 0 ]; then
            echo "::error::No ggml backend plugins (.so) found in $GGML_LIBEXEC"
            exit 1
          fi
          echo "Bundled $BACKEND_COUNT backend plugin(s):"
          ls -la "$RESOURCES_DIR"/*.so

          echo "=== Original llama-completion dependencies ==="
          otool -L "$LLAMA_BIN"

          # Copy a dependency into the bundle
          # Usage: copy_dep "@rpath/libfoo.dylib" dest_dir
          #        copy_dep "/opt/homebrew/opt/openssl@3/lib/libssl.3.dylib" dest_dir
          copy_dep() {
            local dep_path="$1"
            local dest_dir="$2"
            local libname
            libname=$(basename "$dep_path")

            # Skip if already copied
            [ -f "$dest_dir/$libname" ] && return 0

            # If absolute path, copy directly from there
            if [[ "$dep_path" == /* ]] && [ -f "$dep_path" ]; then
              cp -L "$dep_path" "$dest_dir/$libname"
              echo "Copied: $dep_path"
              return 0
            fi

            # For @rpath references, search in known locations
            for searchpath in /opt/homebrew/lib /usr/local/lib /opt/homebrew/opt/*/lib; do
              if [ -f "$searchpath/$libname" ]; then
                cp -L "$searchpath/$libname" "$dest_dir/$libname"
                echo "Copied: $searchpath/$libname"
                return 0
              fi
            done

            # Try without version number (e.g., libfoo.0.dylib -> libfoo.dylib)
            local base_name
            base_name=$(echo "$libname" | sed 's/\.[0-9]*\.dylib/.dylib/')
            if [ "$base_name" != "$libname" ]; then
              for searchpath in /opt/homebrew/lib /usr/local/lib /opt/homebrew/opt/*/lib; do
                if [ -f "$searchpath/$base_name" ]; then
                  cp -L "$searchpath/$base_name" "$dest_dir/$libname"
                  echo "Copied: $searchpath/$base_name -> $libname"
                  return 0
                fi
              done
            fi

            echo "Warning: Could not find $libname"
            return 1
          }

          # Check if a dependency should be bundled (non-system)
          is_bundleable() {
            local dep="$1"
            [[ "$dep" == @rpath/* ]] || [[ "$dep" == /opt/homebrew/* ]] || [[ "$dep" == /usr/local/lib/* ]]
          }

          # Copy all non-system dependencies from llama-completion
          echo "=== Copying direct dependencies ==="
          otool -L "$LLAMA_BIN" | tail -n +2 | awk '{print $1}' | while read dep; do
            if is_bundleable "$dep"; then
              copy_dep "$dep" "$RESOURCES_DIR"
            fi
          done

          # Recursively copy dependencies of dylibs and backend plugins (up to 3 levels deep)
          for iteration in 1 2 3; do
            echo "=== Copying nested dependencies (iteration $iteration) ==="
            for lib in "$RESOURCES_DIR"/*.dylib "$RESOURCES_DIR"/*.so; do
              [ -f "$lib" ] || continue
              otool -L "$lib" 2>/dev/null | tail -n +2 | awk '{print $1}' | while read dep; do
                if is_bundleable "$dep"; then
                  copy_dep "$dep" "$RESOURCES_DIR"
                fi
              done
            done
          done

          # Fix all rpaths - change @rpath to @loader_path
          echo "=== Fixing rpaths ==="
          for file in "$RESOURCES_DIR/llama-completion" "$RESOURCES_DIR"/*.dylib "$RESOURCES_DIR"/*.so; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            echo "Fixing: $filename"

            # Fix the library's own install name (ID) for dylibs
            if [[ "$filename" == *.dylib ]]; then
              install_name_tool -id "@loader_path/$filename" "$file" 2>/dev/null || true
            fi

            # Get all @rpath and Homebrew absolute path references
            otool -L "$file" 2>/dev/null | tail -n +2 | awk '{print $1}' | while read dep; do
              if [[ "$dep" == @rpath/* ]] || [[ "$dep" == /opt/homebrew/* ]] || [[ "$dep" == /usr/local/* ]]; then
                libname=$(basename "$dep")
                install_name_tool -change "$dep" "@loader_path/$libname" "$file" 2>/dev/null || true
              fi
            done
          done

          # Re-sign all modified binaries (required after install_name_tool)
          # Use the same self-signed certificate so TCC permissions persist across updates
          echo "=== Re-signing binaries ==="
          for file in "$RESOURCES_DIR/llama-completion" "$RESOURCES_DIR"/*.dylib "$RESOURCES_DIR"/*.so; do
            [ -f "$file" ] || continue
            codesign --force --options runtime --sign "$SIGNING_IDENTITY" --keychain "$KEYCHAIN_PATH" "$file"
            echo "Signed: $(basename "$file")"
          done

          # Debug: show what we bundled
          echo "=== Bundled files ==="
          ls -la "$RESOURCES_DIR/"
          echo "=== Final llama-completion dependencies ==="
          otool -L "$RESOURCES_DIR/llama-completion"
          echo "=== Sample dylib dependencies ==="
          for lib in "$RESOURCES_DIR"/libllama*.dylib; do
            [ -f "$lib" ] && otool -L "$lib" | head -5
            break
          done

          # Remove quarantine attribute
          xattr -cr "$APP_PATH"

          # Sign the entire app bundle with the self-signed certificate
          # --options runtime preserves hardened runtime (ENABLE_HARDENED_RUNTIME=YES)
          # This ensures macOS TCC identifies the app by certificate, not CDHash
          echo "=== Signing app bundle ==="
          codesign --force --deep --options runtime --sign "$SIGNING_IDENTITY" --keychain "$KEYCHAIN_PATH" "$APP_PATH"
          echo "=== Verifying signature ==="
          codesign --verify --deep --strict "$APP_PATH"
          codesign -dvvv "$APP_PATH"

      - name: Create ZIP
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd build/Build/Products/Release
          zip -r "AirLingua-${VERSION}.zip" "AirLingua.app"
          mv "AirLingua-${VERSION}.zip" "$GITHUB_WORKSPACE/"
          cd "$GITHUB_WORKSPACE"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          SHA256=$(shasum -a 256 "AirLingua-${VERSION}.zip" | cut -d ' ' -f 1)
          echo "SHA256=${SHA256}" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: AirLingua-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keychain
        if: always()
        timeout-minutes: 1
        run: |
          # Deleting the keychain is sufficient for GitHub-hosted runners.
          # The admin trust settings are ephemeral on hosted runners (VM is discarded).
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Update Homebrew Tap
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: fuwasegu/homebrew-tap
          event-type: update-airlingua
          client-payload: '{"version": "${{ env.VERSION }}", "sha256": "${{ env.SHA256 }}"}'
